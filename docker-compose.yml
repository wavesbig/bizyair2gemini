services:
  app:
    image: ${IMAGE_NAME:-your-dockerhub-user/bizyair2gemini:latest}
    container_name: bizyair2gemini
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      # 管理密码
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      # 代理 API Key
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      # 日志级别 (debug, info, warn, error)
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # 数据持久化目录
      - ${DATA_DIR:-./data}:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
